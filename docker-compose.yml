services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded files / session data on the host
      - ./backend/uploads:/app/uploads
    environment:
      # Optional: reach an Ollama instance running on the host machine.
      # If Ollama is not running, the backend uses built-in fallback explanations.
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    extra_hosts:
      # Lets the container resolve host.docker.internal on Linux too
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
